version: 2

project_name: logo-ls

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/logo-ls
    binary: logo-ls
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - "386"
      - amd64
      - arm64
    ignore:
      - goos: darwin
        goarch: "386"
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
      - -tags=minimal
    ldflags:
      - -s -w -X github.com/canta2899/logo-ls/internal/cli.Version={{ .Version }}

archives:
  - name_template: "{{ .ProjectName }}-{{ .Tag }}-{{ .Os }}-{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - CHANGELOG.md
      - LICENSE

source:
  enabled: true
  name_template: "{{ .ProjectName }}-{{ .Tag }}-source"

checksum:
  name_template: "checksums.txt"

changelog:
  disable: true

homebrew_casks:
  - name: logo-ls
    binaries:
      - logo-ls
    repository:
      owner: canta2899
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/canta2899/logo-ls"
    description: "A minimal ls replacement, with git status indicators and
      configurable Nerd Font icons"
    license: "MIT"
    commit_author:
      name: goreleaser-bot
      email: goreleaser@users.noreply.github.com
    url:
      verified: "github.com/canta2899/logo-ls/"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/logo-ls"]
          end

aur_sources:
  - name: logo-ls
    homepage: "https://github.com/canta2899/logo-ls"
    description: "A minimal ls replacement, with git status indicators and
      configurable Nerd Font icons"
    license: "MIT"
    git_url: "ssh://aur@aur.archlinux.org/logo-ls.git"
    private_key: "{{ .Env.AUR_SSH_PRIVATE_KEY }}"
    commit_author:
      name: goreleaser-bot
      email: goreleaser@users.noreply.github.com
    makedepends:
      - go
      - git
    build: |-
      go build -trimpath -tags=minimal -ldflags="-s -w -X github.com/canta2899/logo-ls/internal/cli.Version=${pkgver}" ./cmd/logo-ls
    package: |-
      install -Dm755 "./logo-ls" "${pkgdir}/usr/bin/logo-ls"
      install -Dm644 "./LICENSE" "${pkgdir}/usr/share/licenses/${pkgname}/LICENSE"
